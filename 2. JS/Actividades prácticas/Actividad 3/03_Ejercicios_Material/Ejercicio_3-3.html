    <!-- Título de la sección de entrada -->

    <!-- Formulario para la entrada de datos y el cálculo -->

        Número 1: <input type="text" id="dato1" size="20"><br>
        Número 2: <input type="text" id="dato2" size="20"><br>

        <!-- Botón para ejecutar el cálculo -->
        <input type="Button" value="Compara números" 
        onclick='document.getElementById("resultado").value = calculoMax(document.getElementById("dato1").value,document.getElementById("dato2").value)' >

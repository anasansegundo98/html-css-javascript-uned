<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />

    <title>Ejercicio 1-3</title>
  </head>

  <body>
    <script>
      var texto = prompt("Introduce un texto con mayúsculas y minúsculas:");
      document.write("Texto en mayúsculas: " + texto.toUpperCase() + "<br>");
      document.write("Texto en minúsculas: " + texto.toLowerCase());
    </script>
  </body>
</html>

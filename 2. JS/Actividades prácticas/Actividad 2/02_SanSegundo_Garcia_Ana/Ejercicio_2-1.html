<!doctype html>

<head>
    <meta charset="utf-8" />


    <title>Ejercicio 2-1</title>

</head>

<body>

    <h1> Ejercicio 2-1 </h1>

    <div id="comentario"> </div>

    <script languaje="JavaScript">

        let texto_comentario;
                
        do {
           var edad = prompt("Introduce cuántos años tienes:");
            edad = parseInt(edad);

            if (edad > 100 || edad < 1 || isNaN(edad)) {
                alert("El dato introducido es incorrecto. Introduce de nuevo cuántos años tienes");
            }

        } while (edad > 100 || edad < 1 || isNaN(edad));

        if (edad <= 13) {
           texto_comentario = "Tienes " + edad + " años, eres muy jovencito";

        } else if (edad >= 14 && edad <= 17) {
            texto_comentario = "Tienes " + edad + " años, probablemente seas un adolescente insoportable.";

        } else if (edad >= 18 && edad < 65) {
           texto_comentario = "Tienes " + edad + " años, eres mayor de edad.";

        } else if (edad >= 65) {
           texto_comentario = "Disfruta de tu jubilación";

        }
        
        document.getElementById("comentario").innerHTML = texto_comentario;

    </script>

</body>

</html>
